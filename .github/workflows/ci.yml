name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Причина запуска'
        required: false
        default: 'Ручная проверка'

jobs:
  lint:
    name: Lint (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: 18
            experimental: true
          - node-version: 20
            experimental: false
          - node-version: 22
            experimental: false

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установить Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Установить зависимости
        run: npm ci

      - name: Запустить линтер
        run: npm run lint

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: ${{ matrix.experimental }}
    permissions:
      contents: read
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: 18
            experimental: true
          - node-version: 20
            experimental: false
          - node-version: 22
            experimental: false

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установить Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Установить зависимости
        run: npm ci

      - name: Запустить тесты с покрытием
        run: npm run coverage

      - name: Сохранить отчёт о покрытии
        uses: actions/upload-artifact@v4
        if: matrix.node-version == 22
        with:
          name: coverage-report
          path: coverage/

      - name: Показать отчёт в PR
        uses: davelosert/vitest-coverage-report-action@v2
        if: matrix.node-version == 22
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json


  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: 18
            experimental: true
          - node-version: 20
            experimental: false
          - node-version: 22
            experimental: false

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установить Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Установить зависимости
        run: npm ci

      - name: Собрать проект
        run: npm run build
