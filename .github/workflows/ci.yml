name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      matrix:
        node-version: [18, 20, 22]
        experimental: [false]
        include:
          - node-version: 18
            experimental: true

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установить Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Установить зависимости
        run: npm ci

      - name: Запустить линтер
        run: npm run lint

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      matrix:
        node-version: [18, 20, 22]
        experimental: [false]
        include:
          - node-version: 18
            experimental: true

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установить Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Установить зависимости
        run: npm ci

      - name: Запустить тесты
        run: npm run test

  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      matrix:
        node-version: [18, 20, 22]
        experimental: [false]
        include:
          - node-version: 18
            experimental: true

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установить Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Установить зависимости
        run: npm ci

      - name: Собрать проект
        run: npm run build
